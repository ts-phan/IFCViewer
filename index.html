<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visionneuse BIM & Audit BCF</title>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#007bff">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Audit BIM">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visionneuse BIM & Audit BCF</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: '-apple-system', 'Segoe UI', sans-serif; background-color: #f0f0f0; }
        #viewer-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Boutons flottants circulaires (Miniatures) */
        .fab {
            background: rgba(255, 255, 255, 0.95); border: none; border-radius: 50%;
            width: 44px; height: 44px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer; font-size: 1.2em; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }
        .fab:hover { transform: scale(1.05); }

        /* Conteneurs pliables */
        .foldable-container { position: absolute; top: 15px; z-index: 20; display: flex; flex-direction: column; gap: 10px; }
        #model-container { left: 15px; }
        #bcf-container { right: 15px; align-items: flex-end; }

        /* Contenu déplié */
        .panel-content {
            display: none; background: rgba(255, 255, 255, 0.95); padding: 10px 15px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
        }
        .panel-content.show { display: block; animation: fadeIn 0.2s; }
        
        /* Ligne compacte pour les actions BCF */
        .compact-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end;}
        
        input[type="text"] { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9em; width: 140px;}
        input[type="file"] { display: none; } /* Caché, déclenché par les boutons */
        
        .btn-action { background: #007bff; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.9em; }
        .btn-action.success { background: #28a745; }
        .btn-action.danger { background: #dc3545; }
        
        /* Indicateur de chargement et d'aide */
        #status-bar {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 6px 15px; border-radius: 20px;
            font-size: 0.85em; z-index: 15; pointer-events: none;
        }

        /* Liste des défauts */
        #liste-container {
            position: absolute; right: 15px; bottom: 15px; z-index: 10;
            width: 300px; max-height: 50vh; overflow-y: auto;
            display: flex; flex-direction: column; gap: 10px;
        }
        .defaut-item { background: rgba(255,255,255,0.95); border-radius: 10px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); border-left: 4px solid #dc3545;}
        
        /* Modal d'annotation (Formulaire) */
        #modal-annotation {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 100; width: 320px; box-sizing: border-box;
        }
        #modal-annotation input, #modal-annotation textarea, #modal-annotation select { width: 100%; box-sizing: border-box; margin-top: 5px; margin-bottom: 15px; padding: 10px; border-radius: 8px; border: 1px solid #ccc;}
        #preview-img { width: 100%; height: 100px; object-fit: cover; border-radius: 6px; margin-bottom: 10px;}
        .modal-actions { display: flex; gap: 10px; }
        .modal-actions button { flex: 1; padding: 10px; border-radius: 8px; border: none; color: white; font-weight: bold; cursor: pointer;}

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Adaptation Mobile */
        @media (max-width: 768px) {
            #liste-container { left: 15px; width: auto; max-height: 35vh; }
            .compact-row { flex-direction: column; align-items: flex-end; }
            input[type="text"] { width: 100%; }
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.135.0",
                "three/": "https://esm.sh/three@0.135.0/",
                "web-ifc": "https://esm.sh/web-ifc@0.0.36?env=browser",
                "web-ifc-viewer": "https://esm.sh/web-ifc-viewer@1.0.218?external=three,web-ifc&env=browser"
            }
        }
    </script>
</head>
<body>

    <div id="status-bar">👆 Double-cliquez pour ajouter un défaut</div>

    <div id="model-container" class="foldable-container">
        <button class="fab" id="btn-toggle-model" title="Ouvrir Modèle">🏗️</button>
        <div class="panel-content" id="model-content">
            <label class="btn-action" style="display:block; text-align:center;">
                📂 Charger un fichier IFC
                <input type="file" id="upload-ifc" accept=".ifc, .ifczip">
            </label>
        </div>
    </div>

    <div id="bcf-container" class="foldable-container">
        <button class="fab" id="btn-toggle-bcf" title="Actions BCF">📋</button>
        <div class="panel-content" id="bcf-content">
            <div class="compact-row">
                <input type="text" id="nom-projet" placeholder="Nom du projet">
                <label class="btn-action">
                    📥 Importer BCF
                    <input type="file" id="upload-bcf" accept=".bcf,.bcfzip">
                </label>
                <button class="btn-action success" id="btn-exporter-bcf" style="display:none;">💾 Exporter</button>
                <button class="btn-action danger" id="btn-supprimer-tout" style="display:none;" title="Vider">🗑️</button>
            </div>
        </div>
    </div>

    <div id="liste-container"></div>

    <div id="modal-annotation">
        <h3 style="margin-top:0; font-size: 1.1em;">Nouveau Défaut</h3>
        <img id="preview-img" src="" alt="Capture">
        
        <label style="font-size:0.85em; font-weight:bold;">Titre & Type</label>
        <div style="display:flex; gap:10px;">
            <input type="text" id="titre-defaut" placeholder="Ex: Fissure..." style="flex:2;">
            <select id="type-defaut" style="flex:1;"><option value="Issue">Issue</option><option value="Warning">Alerte</option></select>
        </div>
        
        <label style="font-size:0.85em; font-weight:bold;">Description</label>
        <textarea id="desc-defaut" rows="2"></textarea>
        
        <div class="modal-actions">
            <button id="btn-annuler-defaut" style="background:#6c757d;">Annuler</button>
            <button id="btn-valider-defaut" style="background:#28a745;">Valider</button>
        </div>
    </div>

    <div id="viewer-container"></div>

    <script type="module">
        import { Color, Mesh, SphereGeometry, MeshBasicMaterial, Vector3 } from 'three';
        import { IfcViewerAPI } from 'web-ifc-viewer';

        const container = document.getElementById('viewer-container');
        const viewer = new IfcViewerAPI({ container, backgroundColor: new Color(0xf4f7f6) });
        viewer.grid.setGrid();
        viewer.IFC.setWasmPath('../../IFCViewer/'); // Ton chemin fonctionnel

        let listeDefauts = [];
        let donneeTemp = null; 

        const materiauMarqueur = new MeshBasicMaterial({ color: 0xdc3545 });
        const geometrieMarqueur = new SphereGeometry(0.25, 16, 16);

        // --- Logique UI (Plier / Déplier) ---
        document.getElementById('btn-toggle-model').addEventListener('click', () => {
            document.getElementById('model-content').classList.toggle('show');
            document.getElementById('bcf-content').classList.remove('show');
        });

        document.getElementById('btn-toggle-bcf').addEventListener('click', () => {
            document.getElementById('bcf-content').classList.toggle('show');
            document.getElementById('model-content').classList.remove('show');
        });

        function gererAffichageBoutons() {
            const hasDefauts = listeDefauts.length > 0;
            document.getElementById('btn-exporter-bcf').style.display = hasDefauts ? 'block' : 'none';
            document.getElementById('btn-supprimer-tout').style.display = hasDefauts ? 'block' : 'none';
            // Clignotement léger du bouton BCF s'il y a des données non exportées
            document.getElementById('btn-toggle-bcf').style.boxShadow = hasDefauts ? "0 0 15px rgba(40, 167, 69, 0.6)" : "0 4px 10px rgba(0,0,0,0.2)";
        }

        // --- 1. CHARGEMENT IFC ---
        document.getElementById('upload-ifc').addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('status-bar').textContent = "⏳ Chargement en cours...";
            
            try {
                let fichierFinal = file; 
                if (file.name.toLowerCase().endsWith('.ifczip')) {
                    const zip = await JSZip.loadAsync(file);
                    let nomIfc = Object.keys(zip.files).find(n => n.toLowerCase().endsWith('.ifc'));
                    const blob = await zip.files[nomIfc].async("blob");
                    fichierFinal = new File([blob], nomIfc, { type: "application/octet-stream" });
                }
                const url = URL.createObjectURL(fichierFinal);
                await viewer.IFC.loadIfcUrl(url, true);
                
                // Replier le menu modèle
                document.getElementById('model-content').classList.remove('show');
                document.getElementById('status-bar').textContent = "👆 Double-cliquez pour ajouter un défaut";

            } catch (err) { alert("Erreur IFC : " + err.message); } 
        });

        // --- 2. IMPORT BCF ---
        document.getElementById('upload-bcf').addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('status-bar').textContent = "📂 Lecture du BCF...";

            try {
                const zip = await JSZip.loadAsync(file);
                const defautsParGuid = {};

                for (const path in zip.files) {
                    if (zip.files[path].dir) continue;
                    
                    if (path === 'project.bcf') {
                        const xml = await zip.files[path].async("string");
                        const doc = new DOMParser().parseFromString(xml, "text/xml");
                        const nomProjetExtrait = doc.querySelector("Name")?.textContent;
                        if (nomProjetExtrait) document.getElementById('nom-projet').value = nomProjetExtrait;
                        continue;
                    }

                    const parts = path.split('/');
                    const guid = parts[0];
                    if (!guid || path.indexOf('/') === -1) continue; 
                    
                    if (!defautsParGuid[guid]) defautsParGuid[guid] = { id: guid, type: "Issue" };

                    if (path.endsWith('markup.bcf')) {
                        const xml = await zip.files[path].async("string");
                        const doc = new DOMParser().parseFromString(xml, "text/xml");
                        defautsParGuid[guid].titre = doc.querySelector("Title")?.textContent || "Défaut";
                        
                        let descriptionReelle = doc.querySelector("Description")?.textContent || "";
                        const matchLaser = descriptionReelle.match(/\[LASER:([^;]+);([^;]+);([^\]]+)\]/);
                        if (matchLaser) {
                            defautsParGuid[guid].x = parseFloat(matchLaser[1]);
                            defautsParGuid[guid].y = parseFloat(matchLaser[2]);
                            defautsParGuid[guid].z = parseFloat(matchLaser[3]);
                            descriptionReelle = descriptionReelle.replace(matchLaser[0], '').trim();
                        }
                        defautsParGuid[guid].desc = descriptionReelle;
                        
                    } else if (path.endsWith('viewpoint.bcfv')) {
                        const xml = await zip.files[path].async("string");
                        const doc = new DOMParser().parseFromString(xml, "text/xml");
                        const pos = doc.querySelector("CameraViewPoint");
                        const dir = doc.querySelector("CameraDirection");
                        
                        if (pos && dir) {
                            defautsParGuid[guid].camX = parseFloat(pos.querySelector("X").textContent);
                            defautsParGuid[guid].camY = parseFloat(pos.querySelector("Y").textContent);
                            defautsParGuid[guid].camZ = parseFloat(pos.querySelector("Z").textContent);
                            defautsParGuid[guid].dirX = parseFloat(dir.querySelector("X").textContent);
                            defautsParGuid[guid].dirY = parseFloat(dir.querySelector("Y").textContent);
                            defautsParGuid[guid].dirZ = parseFloat(dir.querySelector("Z").textContent);
                        }
                    }
                }

                setTimeout(() => {
                    Object.values(defautsParGuid).forEach(def => {
                        if(def.titre) {
                            if (def.x !== undefined && !isNaN(def.x)) {
                                const marqueur = new Mesh(geometrieMarqueur, materiauMarqueur);
                                marqueur.position.set(def.x, def.y, def.z);
                                viewer.context.getScene().add(marqueur);
                                def.mesh3D = marqueur;
                            }
                            listeDefauts.push(def);
                            ajouterAuPanneau(def);
                        }
                    });
                    gererAffichageBoutons();
                    document.getElementById('bcf-content').classList.remove('show');
                    document.getElementById('status-bar').textContent = "👆 Double-cliquez pour ajouter un défaut";
                }, 500);

            } catch (err) { alert("Erreur BCF"); console.error(err); }
        });

        // --- 3. ANNOTATION PAR DÉFAUT (Double Clic) ---
        // Plus besoin de bouton, l'événement est toujours actif.
        window.addEventListener('dblclick', async (event) => {
            // Empêche de déclencher l'annotation si on clique sur l'interface (boutons, formulaires)
            if(event.target.closest('.foldable-container') || event.target.closest('#modal-annotation') || event.target.closest('#liste-container')) return;

            const intersection = viewer.context.castRayIfc(event);
            if (!intersection) return; 

            const pointHit = intersection.point;
            const cam = viewer.context.ifcCamera.cameraControls.camera;
            const camPos = cam.position.clone();
            const camDir = new Vector3();
            cam.getWorldDirection(camDir);
            const camUp = cam.up.clone();

            const renderer = viewer.context.getRenderer();
            const scene = viewer.context.getScene();
            renderer.render(scene, cam);
            const canvas = document.querySelector('canvas');
            const imageBase64 = canvas.toDataURL("image/png");

            donneeTemp = {
                id: generateUUID(),
                x: pointHit.x, y: pointHit.y, z: pointHit.z,
                camX: camPos.x, camY: camPos.y, camZ: camPos.z,
                dirX: camDir.x, dirY: camDir.y, dirZ: camDir.z,
                upX: camUp.x, upY: camUp.y, upZ: camUp.z,
                image: imageBase64
            };

            document.getElementById('preview-img').src = imageBase64;
            document.getElementById('titre-defaut').value = "";
            document.getElementById('desc-defaut').value = "";
            document.getElementById('modal-annotation').style.display = 'block';
        });

        document.getElementById('btn-annuler-defaut').addEventListener('click', () => { 
            document.getElementById('modal-annotation').style.display = 'none'; donneeTemp = null; 
        });

        document.getElementById('btn-valider-defaut').addEventListener('click', () => {
            if (!donneeTemp) return;
            donneeTemp.titre = document.getElementById('titre-defaut').value || "Défaut";
            donneeTemp.desc = document.getElementById('desc-defaut').value;
            donneeTemp.type = document.getElementById('type-defaut').value;

            const marqueur = new Mesh(geometrieMarqueur, materiauMarqueur);
            marqueur.position.set(donneeTemp.x, donneeTemp.y, donneeTemp.z);
            viewer.context.getScene().add(marqueur);
            
            donneeTemp.mesh3D = marqueur;
            listeDefauts.push(donneeTemp);
            ajouterAuPanneau(donneeTemp);
            gererAffichageBoutons();
            
            document.getElementById('modal-annotation').style.display = 'none';
            donneeTemp = null;
        });

        // --- 4. AFFICHAGE LISTE ---
        function ajouterAuPanneau(def) {
            const div = document.createElement('div');
            div.className = "defaut-item";
            
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div style="font-weight:bold; color:#333; font-size: 0.9em;">${def.titre}</div>
                    <button class="btn-action danger" style="padding: 2px 6px; font-size: 0.8em; margin:0;" title="Supprimer">X</button>
                </div>
                <div style="font-size:0.8em; color:#666; margin: 5px 0;">${def.desc}</div>
                <div class="btn-voler" style="font-size:0.85em; color:#007bff; cursor:pointer; font-weight:bold;">👁️ Voler vers la caméra</div>
            `;

            div.querySelector('.btn-voler').addEventListener('click', () => {
                if (def.camX !== undefined) {
                    viewer.context.ifcCamera.cameraControls.setLookAt(
                        def.camX, def.camY, def.camZ, def.camX + def.dirX, def.camY + def.dirY, def.camZ + def.dirZ, true 
                    );
                }
            });

            div.querySelector('.danger').addEventListener('click', () => {
                if(confirm("Supprimer ce défaut ?")) {
                    listeDefauts = listeDefauts.filter(d => d.id !== def.id);
                    if (def.mesh3D) { viewer.context.getScene().remove(def.mesh3D); }
                    div.remove();
                    gererAffichageBoutons();
                }
            });

            document.getElementById('liste-container').appendChild(div);
            document.getElementById('liste-container').scrollTop = document.getElementById('liste-container').scrollHeight;
        }

        document.getElementById('btn-supprimer-tout').addEventListener('click', () => {
            if(confirm("Tout supprimer ?")) {
                listeDefauts.forEach(def => { if (def.mesh3D) viewer.context.getScene().remove(def.mesh3D); });
                listeDefauts = [];
                document.getElementById('liste-container').innerHTML = '';
                gererAffichageBoutons();
            }
        });

        // --- 5. EXPORT BCF ---
        document.getElementById('btn-exporter-bcf').addEventListener('click', async () => {
            if (listeDefauts.length === 0) return;
            const zip = new JSZip();
            zip.file("bcf.version", `<?xml version="1.0" encoding="UTF-8"?><Version VersionId="2.1"/>`);

            const nomProjet = document.getElementById('nom-projet').value || "Projet_Sans_Nom";
            zip.file("project.bcf", `<?xml version="1.0" encoding="UTF-8"?><ProjectExtension><Project><ProjectId>${generateUUID()}</ProjectId><Name>${nomProjet}</Name></Project></ProjectExtension>`);

            listeDefauts.forEach((def, index) => {
                const folder = zip.folder(def.id);
                const codeLaser = def.x !== undefined ? `\n\n[LASER:${def.x.toFixed(4)};${def.y.toFixed(4)};${def.z.toFixed(4)}]` : "";
                
                folder.file("markup.bcf", `<?xml version="1.0" encoding="UTF-8"?><Markup><Topic Guid="${def.id}" TopicType="${def.type}" TopicStatus="Open"><Title>${def.titre}</Title><Index>${index+1}</Index><CreationDate>${new Date().toISOString()}</CreationDate><CreationAuthor>Auditeur</CreationAuthor><Description>${(def.desc || "") + codeLaser}</Description></Topic></Markup>`);
                
                if (def.camX !== undefined) {
                    folder.file("viewpoint.bcfv", `<?xml version="1.0" encoding="UTF-8"?><VisualizationInfo><PerspectiveCamera><CameraViewPoint><X>${def.camX}</X><Y>${def.camY}</Y><Z>${def.camZ}</Z></CameraViewPoint><CameraDirection><X>${def.dirX}</X><Y>${def.dirY}</Y><Z>${def.dirZ}</Z></CameraDirection><CameraUpVector><X>${def.upX}</X><Y>${def.upY}</Y><Z>${def.upZ}</Z></CameraUpVector><FieldOfView>60</FieldOfView></PerspectiveCamera></VisualizationInfo>`);
                }

                if (def.image) {
                    const imgData = def.image.split(',')[1];
                    const byteString = atob(imgData);
                    const ab = new ArrayBuffer(byteString.length);
                    const ia = new Uint8Array(ab);
                    for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
                    folder.file("snapshot.png", ab);
                }
            });

            const content = await zip.generateAsync({ type: "blob" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(content);
            link.download = `Audit_${nomProjet.replace(/[^a-zA-Z0-9_-]/g, '_')}_${new Date().toISOString().slice(0,10)}.bcfzip`;
            link.click();
        });

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8); return v.toString(16);
            });
        }
    </script>
</body>

    <script>
        // Enregistrement du Service Worker pour le mode hors-ligne
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker enregistré avec succès !', reg.scope))
                    .catch(err => console.error('Échec du Service Worker :', err));
            });
        }
    </script>
    
</html>
