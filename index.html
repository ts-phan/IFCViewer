<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visionneuse BIM & Audit BCF</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: '-apple-system', 'Segoe UI', sans-serif; background-color: #f0f0f0; }
        #viewer-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .panel {
            position: absolute; z-index: 10; background: rgba(255, 255, 255, 0.95);
            padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.25); width: 320px;
            box-sizing: border-box; backdrop-filter: blur(5px);
        }
        #ui-panel { top: 20px; left: 20px; }
        #audit-panel { top: 20px; right: 20px; max-height: 85vh; overflow-y: auto; display: flex; flex-direction: column;}
        
        /* Bouton flottant pour réafficher le panneau d'import */
        #btn-toggle-ui {
            display: none; position: absolute; top: 20px; left: 20px; z-index: 20;
            background: rgba(255, 255, 255, 0.95); border: none; padding: 12px 15px; 
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-weight: bold; cursor: pointer;
        }

        h2 { margin-top: 0; color: #2c3e50; font-size: 1.2em; border-bottom: 2px solid #eee; padding-bottom: 10px;}
        input[type="text"], input[type="file"], select { margin-top: 5px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; width: 100%; box-sizing: border-box; background: #fafafa;}
        input[type="file"] { border: 2px dashed #007bff; }
        
        /* Amélioration des boutons pour le tactile */
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; transition: 0.2s; min-height: 44px;}
        button:hover { filter: brightness(1.1); }
        button.active { background: #dc3545; animation: pulse 1.5s infinite; }
        button.success { background: #28a745; }
        button.danger { background: #dc3545; }
        
        #modal-annotation {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 100; width: 350px;
            box-sizing: border-box;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        #preview-img { width: 100%; height: 120px; object-fit: cover; border-radius: 6px; border: 1px solid #ddd; margin-bottom: 10px;}
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        #liste-defauts { list-style: none; padding: 0; margin-top: 10px; overflow-y: auto; flex-grow: 1;}
        .defaut-item { background: #fff; border: 1px solid #dee2e6; padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #007bff;}
        .defaut-img-min { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; margin-top: 8px; border: 1px solid #eee; }
        
        .zone-import { padding-bottom: 15px; margin-bottom: 15px; border-bottom: 1px solid #ddd; }
        
        .btn-voler { font-size:0.9em; color:#007bff; cursor:pointer; font-weight:bold; padding-top: 5px; display: inline-block;}
        .btn-supprimer { background:none; border:none; padding:0; margin:0; cursor:pointer; font-size:1.3em; width:auto; min-height: auto;}
        
        /* =======================================================
           🚀 ADAPTATION SPÉCIFIQUE IPHONE / SMARTPHONE
           ======================================================= */
        @media (max-width: 768px) {
            .panel {
                width: 94vw;
                left: 3vw !important; /* Centre horizontalement */
                right: auto !important;
                padding: 15px;
            }
            #ui-panel { top: 15px; }
            #btn-toggle-ui { top: 15px; left: 3vw; }
            
            #audit-panel {
                top: auto; 
                bottom: 15px; /* Colle au bas de l'écran */
                max-height: 40vh; /* Ne prend que 40% de l'écran pour laisser la 3D visible */
                border-radius: 16px;
            }
            
            #modal-annotation {
                width: 90vw;
                padding: 20px;
                max-height: 90vh; /* Évite de déborder si le clavier iOS est ouvert */
                overflow-y: auto;
            }
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://esm.sh/three@0.135.0",
                "three/": "https://esm.sh/three@0.135.0/",
                "web-ifc": "https://esm.sh/web-ifc@0.0.36?env=browser",
                "web-ifc-viewer": "https://esm.sh/web-ifc-viewer@1.0.218?external=three,web-ifc&env=browser"
            }
        }
    </script>
</head>
<body>

    <button id="btn-toggle-ui">📁 Changer de modèle</button>

    <div class="panel" id="ui-panel">
        <h2>🏗️ 1. Modèle 3D</h2>
        <input type="file" id="upload-ifc" accept=".ifc, .ifczip">
        <div id="chargement" style="display:none; color:#007bff; font-weight:bold; margin-top:10px;">⏳ Chargement...</div>
    </div>

    <div class="panel" id="audit-panel">
        <h2>📋 2. Données d'Audit</h2>
        
        <div class="zone-import">
            <label style="font-size:0.9em; font-weight:bold; color:#444;">🏷️ Nom du projet</label>
            <input type="text" id="nom-projet" placeholder="Ex: Gare de Lyon - Voie A">
        </div>

        <div class="zone-import">
            <label style="font-size:0.9em; font-weight:bold; color:#444;">📥 Lire un BCF existant</label>
            <input type="file" id="upload-bcf" accept=".bcf,.bcfzip">
        </div>

        <div>
            <label style="font-size:0.9em; font-weight:bold; color:#444;">➕ Ajouter un défaut</label>
            <button id="btn-mode-annotation">🎯 Activer le laser</button>
            <p style="font-size:0.8em; color:#666; display:none; margin-bottom:0;" id="aide-clic">Double-cliquez sur le modèle 3D.</p>
        </div>
        
        <ul id="liste-defauts"></ul>
        
        <div id="actions-globales" style="display:none; margin-top: 15px; border-top: 1px solid #ddd; padding-top: 15px;">
            <button id="btn-supprimer-tout" class="danger">🗑️ Tout supprimer</button>
            <button id="btn-exporter-bcf" class="success">💾 Exporter (.bcfzip)</button>
        </div>
    </div>

    <div id="modal-annotation">
        <h3 style="margin-top:0;">Nouveau Défaut</h3>
        <img id="preview-img" src="" alt="Capture">
        <div class="form-group"><label>Titre</label><input type="text" id="titre-defaut"></div>
        <div class="form-group"><label>Description</label><textarea id="desc-defaut" rows="2" style="width: 100%; border-radius: 8px; border: 1px solid #ccc; padding: 10px;"></textarea></div>
        <div class="form-group">
            <label>Type</label>
            <select id="type-defaut"><option value="Issue">Erreur (Issue)</option><option value="Warning">Alerte</option></select>
        </div>
        <button id="btn-valider-defaut" class="success">Valider</button>
        <button id="btn-annuler-defaut" style="background:#6c757d;">Annuler</button>
    </div>

    <div id="viewer-container"></div>

    <script type="module">
        import { Color, Mesh, SphereGeometry, MeshBasicMaterial, Vector3 } from 'three';
        import { IfcViewerAPI } from 'web-ifc-viewer';

        const container = document.getElementById('viewer-container');
        const viewer = new IfcViewerAPI({ container, backgroundColor: new Color(0xf4f7f6) });
        viewer.grid.setGrid();
        
        // Ton chemin fonctionnel conservé
        viewer.IFC.setWasmPath('../../IFCViewer/');

        let modeAnnotationActif = false;
        let listeDefauts = [];
        let donneeTemp = null; 

        const materiauMarqueur = new MeshBasicMaterial({ color: 0xff0000 });
        const geometrieMarqueur = new SphereGeometry(0.2, 16, 16);

        function gererAffichageBoutons() {
            const actionsGlobales = document.getElementById('actions-globales');
            actionsGlobales.style.display = listeDefauts.length > 0 ? 'block' : 'none';
        }

        // Gestion de l'affichage du panneau UI pour libérer l'écran
        document.getElementById('btn-toggle-ui').addEventListener('click', () => {
            document.getElementById('ui-panel').style.display = 'block';
            document.getElementById('btn-toggle-ui').style.display = 'none';
        });

        // ==========================================
        // 1. CHARGEMENT IFC
        // ==========================================
        document.getElementById('upload-ifc').addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('chargement').style.display = 'block';
            let fichierFinal = file; 

            try {
                if (file.name.toLowerCase().endsWith('.ifczip')) {
                    const zip = await JSZip.loadAsync(file);
                    let nomIfc = Object.keys(zip.files).find(n => n.toLowerCase().endsWith('.ifc'));
                    const blob = await zip.files[nomIfc].async("blob");
                    fichierFinal = new File([blob], nomIfc, { type: "application/octet-stream" });
                }
                const url = URL.createObjectURL(fichierFinal);
                await viewer.IFC.loadIfcUrl(url, true);
                
                // Masquer le panneau d'import après succès pour libérer la vue mobile
                document.getElementById('ui-panel').style.display = 'none';
                document.getElementById('btn-toggle-ui').style.display = 'block';

            } catch (err) { alert("Erreur IFC : " + err.message); console.error(err); } 
            finally { document.getElementById('chargement').style.display = 'none'; }
        });

        // ==========================================
        // 2. IMPORT BCF EXISTANT
        // ==========================================
        document.getElementById('upload-bcf').addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            try {
                const zip = await JSZip.loadAsync(file);
                const defautsParGuid = {};

                for (const path in zip.files) {
                    if (zip.files[path].dir) continue;
                    
                    if (path === 'project.bcf') {
                        const xml = await zip.files[path].async("string");
                        const doc = new DOMParser().parseFromString(xml, "text/xml");
                        const nomProjetExtrait = doc.querySelector("Name")?.textContent;
                        if (nomProjetExtrait) {
                            document.getElementById('nom-projet').value = nomProjetExtrait;
                        }
                        continue;
                    }

                    const parts = path.split('/');
                    const guid = parts[0];
                    if (!guid || path.indexOf('/') === -1) continue; 
                    
                    if (!defautsParGuid[guid]) defautsParGuid[guid] = { id: guid, type: "Issue" };

                    if (path.endsWith('markup.bcf')) {
                        const xml = await zip.files[path].async("string");
                        const doc = new DOMParser().parseFromString(xml, "text/xml");
                        defautsParGuid[guid].titre = doc.querySelector("Title")?.textContent || "Défaut";
                        
                        let descriptionReelle = doc.querySelector("Description")?.textContent || "";
                        const matchLaser = descriptionReelle.match(/\[LASER:([^;]+);([^;]+);([^\]]+)\]/);
                        if (matchLaser) {
                            defautsParGuid[guid].x = parseFloat(matchLaser[1]);
                            defautsParGuid[guid].y = parseFloat(matchLaser[2]);
                            defautsParGuid[guid].z = parseFloat(matchLaser[3]);
                            descriptionReelle = descriptionReelle.replace(matchLaser[0], '').trim();
                        }
                        defautsParGuid[guid].desc = descriptionReelle;
                        
                    } else if (path.endsWith('viewpoint.bcfv')) {
                        const xml = await zip.files[path].async("string");
                        const doc = new DOMParser().parseFromString(xml, "text/xml");
                        const pos = doc.querySelector("CameraViewPoint");
                        const dir = doc.querySelector("CameraDirection");
                        const up = doc.querySelector("CameraUpVector");

                        if (pos && dir && up) {
                            defautsParGuid[guid].camX = parseFloat(pos.querySelector("X").textContent);
                            defautsParGuid[guid].camY = parseFloat(pos.querySelector("Y").textContent);
                            defautsParGuid[guid].camZ = parseFloat(pos.querySelector("Z").textContent);
                            defautsParGuid[guid].dirX = parseFloat(dir.querySelector("X").textContent);
                            defautsParGuid[guid].dirY = parseFloat(dir.querySelector("Y").textContent);
                            defautsParGuid[guid].dirZ = parseFloat(dir.querySelector("Z").textContent);
                        }
                    } else if (path.endsWith('snapshot.png')) {
                        const blob = await zip.files[path].async("blob");
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        reader.onloadend = () => { defautsParGuid[guid].image = reader.result; }
                    }
                }

                setTimeout(() => {
                    Object.values(defautsParGuid).forEach(def => {
                        if(def.titre) {
                            if (def.x !== undefined && !isNaN(def.x)) {
                                const marqueur = new Mesh(geometrieMarqueur, materiauMarqueur);
                                marqueur.position.set(def.x, def.y, def.z);
                                viewer.context.getScene().add(marqueur);
                                def.mesh3D = marqueur;
                            }
                            listeDefauts.push(def);
                            ajouterAuPanneau(def);
                        }
                    });
                    gererAffichageBoutons();
                }, 500);

            } catch (err) { alert("Erreur BCF : Archive illisible."); console.error(err); }
        });

        // ==========================================
        // 3. LOGIQUE D'ANNOTATION MANUELLE
        // ==========================================
        const btnMode = document.getElementById('btn-mode-annotation');
        const aideClic = document.getElementById('aide-clic');
        const modal = document.getElementById('modal-annotation');

        btnMode.addEventListener('click', () => {
            modeAnnotationActif = !modeAnnotationActif;
            if (modeAnnotationActif) {
                btnMode.textContent = "🛑 Quitter le mode Annotation";
                btnMode.classList.add("active");
                aideClic.style.display = "block";
            } else {
                btnMode.textContent = "🎯 Activer le laser";
                btnMode.classList.remove("active");
                aideClic.style.display = "none";
            }
        });

        window.addEventListener('dblclick', async (event) => {
            if (!modeAnnotationActif) return;

            const intersection = viewer.context.castRayIfc(event);
            if (!intersection) return; 

            const pointHit = intersection.point;
            const cam = viewer.context.ifcCamera.cameraControls.camera;
            const camPos = cam.position.clone();
            const camDir = new Vector3();
            cam.getWorldDirection(camDir);
            const camUp = cam.up.clone();

            const renderer = viewer.context.getRenderer();
            const scene = viewer.context.getScene();
            renderer.render(scene, cam);
            const canvas = document.querySelector('canvas');
            const imageBase64 = canvas.toDataURL("image/png");

            donneeTemp = {
                id: generateUUID(),
                x: pointHit.x, y: pointHit.y, z: pointHit.z,
                camX: camPos.x, camY: camPos.y, camZ: camPos.z,
                dirX: camDir.x, dirY: camDir.y, dirZ: camDir.z,
                upX: camUp.x, upY: camUp.y, upZ: camUp.z,
                image: imageBase64
            };

            document.getElementById('preview-img').src = imageBase64;
            document.getElementById('titre-defaut').value = "";
            document.getElementById('desc-defaut').value = "";
            modal.style.display = 'block';
        });

        document.getElementById('btn-annuler-defaut').addEventListener('click', () => { modal.style.display = 'none'; donneeTemp = null; });

        document.getElementById('btn-valider-defaut').addEventListener('click', () => {
            if (!donneeTemp) return;
            donneeTemp.titre = document.getElementById('titre-defaut').value || "Défaut";
            donneeTemp.desc = document.getElementById('desc-defaut').value;
            donneeTemp.type = document.getElementById('type-defaut').value;

            const marqueur = new Mesh(geometrieMarqueur, materiauMarqueur);
            marqueur.position.set(donneeTemp.x, donneeTemp.y, donneeTemp.z);
            viewer.context.getScene().add(marqueur);
            
            donneeTemp.mesh3D = marqueur;

            listeDefauts.push(donneeTemp);
            ajouterAuPanneau(donneeTemp);

            gererAffichageBoutons();
            modal.style.display = 'none';
            donneeTemp = null;
        });

        // ==========================================
        // 4. AFFICHAGE, TÉLÉPORTATION ET SUPPRESSION
        // ==========================================
        function ajouterAuPanneau(def) {
            const li = document.createElement('li');
            li.className = "defaut-item";
            
            li.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div style="font-weight:bold; color:#333;">${def.titre}</div>
                    <button class="btn-supprimer" title="Supprimer">🗑️</button>
                </div>
                <div style="font-size:0.85em; color:#666; margin-bottom:5px;">${def.desc}</div>
                <div class="btn-voler">👁️ Voler vers la caméra</div>
                ${def.image ? `<img class="defaut-img-min" src="${def.image}">` : ''}
            `;

            li.querySelector('.btn-voler').addEventListener('click', () => {
                if (def.camX !== undefined) {
                    const cibleX = def.camX + def.dirX;
                    const cibleY = def.camY + def.dirY;
                    const cibleZ = def.camZ + def.dirZ;
                    viewer.context.ifcCamera.cameraControls.setLookAt(
                        def.camX, def.camY, def.camZ, cibleX, cibleY, cibleZ, true 
                    );
                }
            });

            li.querySelector('.btn-supprimer').addEventListener('click', () => {
                if(confirm("Supprimer ce défaut ?")) {
                    listeDefauts = listeDefauts.filter(d => d.id !== def.id);
                    if (def.mesh3D) { viewer.context.getScene().remove(def.mesh3D); }
                    li.remove();
                    gererAffichageBoutons();
                }
            });

            document.getElementById('liste-defauts').appendChild(li);
            
            // Fait défiler le panneau vers le bas pour voir le nouveau défaut
            const panel = document.getElementById('audit-panel');
            panel.scrollTop = panel.scrollHeight;
        }

        document.getElementById('btn-supprimer-tout').addEventListener('click', () => {
            if(confirm("Tout supprimer ?")) {
                listeDefauts.forEach(def => {
                    if (def.mesh3D) { viewer.context.getScene().remove(def.mesh3D); }
                });
                listeDefauts = [];
                document.getElementById('liste-defauts').innerHTML = '';
                gererAffichageBoutons();
            }
        });

        // ==========================================
        // 5. EXPORT FINAL
        // ==========================================
        document.getElementById('btn-exporter-bcf').addEventListener('click', async () => {
            if (listeDefauts.length === 0) return;
            const zip = new JSZip();
            zip.file("bcf.version", `<?xml version="1.0" encoding="UTF-8"?><Version VersionId="2.1"/>`);

            const nomProjet = document.getElementById('nom-projet').value || "Projet_Sans_Nom";
            const projetId = generateUUID();
            zip.file("project.bcf", `<?xml version="1.0" encoding="UTF-8"?><ProjectExtension><Project><ProjectId>${projetId}</ProjectId><Name>${nomProjet}</Name></Project></ProjectExtension>`);

            listeDefauts.forEach((def, index) => {
                const folder = zip.folder(def.id);
                
                let codeLaser = "";
                if (def.x !== undefined) {
                    codeLaser = `\n\n[LASER:${def.x.toFixed(4)};${def.y.toFixed(4)};${def.z.toFixed(4)}]`;
                }
                const descriptionFinale = (def.desc || "") + codeLaser;

                folder.file("markup.bcf", `<?xml version="1.0" encoding="UTF-8"?>
<Markup><Topic Guid="${def.id}" TopicType="${def.type}" TopicStatus="Open"><Title>${def.titre}</Title><Index>${index+1}</Index><CreationDate>${new Date().toISOString()}</CreationDate><CreationAuthor>Auditeur</CreationAuthor><Description>${descriptionFinale}</Description></Topic></Markup>`);
                
                if (def.camX !== undefined) {
                    folder.file("viewpoint.bcfv", `<?xml version="1.0" encoding="UTF-8"?>
<VisualizationInfo><PerspectiveCamera>
    <CameraViewPoint><X>${def.camX}</X><Y>${def.camY}</Y><Z>${def.camZ}</Z></CameraViewPoint>
    <CameraDirection><X>${def.dirX}</X><Y>${def.dirY}</Y><Z>${def.dirZ}</Z></CameraDirection>
    <CameraUpVector><X>${def.upX}</X><Y>${def.upY}</Y><Z>${def.upZ}</Z></CameraUpVector>
    <FieldOfView>60</FieldOfView>
</PerspectiveCamera></VisualizationInfo>`);
                }

                if (def.image) {
                    const imgData = def.image.split(',')[1];
                    const byteString = atob(imgData);
                    const ab = new ArrayBuffer(byteString.length);
                    const ia = new Uint8Array(ab);
                    for (let i = 0; i < byteString.length; i++) { ia[i] = byteString.charCodeAt(i); }
                    folder.file("snapshot.png", ab);
                }
            });

            const content = await zip.generateAsync({ type: "blob" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(content);
            const nomFichierNettoye = nomProjet.replace(/[^a-zA-Z0-9_-]/g, '_');
            link.download = `Audit_${nomFichierNettoye}_${new Date().toISOString().slice(0,10)}.bcfzip`;
            link.click();
        });

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8); return v.toString(16);
            });
        }
    </script>
</body>
</html>
